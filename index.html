<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="/_vercel/insights/script.js"></script>
    <title>Theophilus Omoregbee</title>
    <meta name="description" content="Theophilus Omoregbee — Creator, Thinker, Writer, Developer." />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#fdfdfc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f0f0e" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='24' font-size='24' font-family='system-ui'%3ET%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
      :root {
        --bg: #fdfdfc;
        --fg: #141414;
        --mute: #8a8a87;
        --accent: #c2410c;
      }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #0f0f0e; --fg: #ededea; --mute: #7c7c78; --accent: #e58a5c; }
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html { font-family: 'Inter', system-ui, sans-serif; }
      @supports (font-variation-settings: normal) {
        html { font-family: 'Inter var', system-ui, sans-serif; }
      }

      body {
        background: var(--bg);
        color: var(--fg);
        font-size: 15px;
        line-height: 1.6;
        font-feature-settings: 'ss01', 'cv11';
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2.5rem 1.5rem;
        text-align: center;
      }

      main { max-width: 44rem; width: 100%; }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-bottom: 0.4rem;
      }

      .tag {
        font-size: 0.92rem;
        color: var(--mute);
        margin-bottom: 0.35rem;
      }

      .where {
        font-size: 0.8rem;
        color: var(--mute);
        margin-bottom: 2rem;
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
      }

      .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--accent);
        display: inline-block;
        box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 55%, transparent);
        animation: pulse 2.4s ease-out infinite;
      }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 55%, transparent); }
        100% { box-shadow: 0 0 0 8px color-mix(in srgb, var(--accent) 0%, transparent); }
      }

      nav {
        display: flex;
        justify-content: center;
        gap: 1.4rem;
        font-size: 0.92rem;
        white-space: nowrap;
      }

      a {
        color: var(--fg);
        text-decoration: none;
        position: relative;
        transition: color 0.15s ease;
      }

      a::after {
        content: "";
        position: absolute;
        left: 0; right: 0; bottom: -2px;
        height: 1px;
        background: currentColor;
        transform: scaleX(0);
        transform-origin: center;
        transition: transform 0.2s ease;
      }

      a:hover, a:focus-visible { color: var(--accent); outline: none; }
      a:hover::after, a:focus-visible::after { transform: scaleX(1); }

      @media (max-width: 640px) {
        nav { flex-wrap: wrap; gap: 0.5rem 1rem; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Theophilus Omoregbee</h1>
      <p class="tag">Creator. Thinker. Writer. Developer.</p>
      <p class="where"><span class="dot"></span>Toronto, Canada</p>
      <nav>
        <a href="mailto:hi@theoomoregbee.com">Email</a>
        <a href="https://github.com/theoomoregbee" target="_blank" rel="me noopener">GitHub</a>
        <a href="https://linkedin.com/in/theoomoregbee" target="_blank" rel="me noopener">LinkedIn</a>
        <a href="https://twitter.com/theoomoregbee" target="_blank" rel="me noopener">Twitter</a>
        <a href="https://medium.com/@theoomoregbee" target="_blank" rel="me noopener">Medium</a>
        <a href="https://stackoverflow.com/users/5836034/theophilus-omoregbee" target="_blank" rel="me noopener">Stack Overflow</a>
        <a href="https://www.codementor.io/@theo4u" target="_blank" rel="me noopener">Codementor</a>
      </nav>
    </main>
  </body>
</html>
